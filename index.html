<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API 工具箱 — 免费接口合集</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="brand" href="/">API 工具箱</a>
  </div>
</header>

<section class="hero">
  <div class="hero-inner">
    <h1>免费 API 接口合集</h1>
    <p class="hero-sub">332 个免费接口，即搜即用</p>
    <div class="search-wrap">
      <input type="text" id="searchInput" class="search-input" placeholder="搜索 API 名称或描述..." autocomplete="off">
      <button id="searchClear" class="search-clear" hidden>&times;</button>
    </div>
    <div class="category-tags" id="categoryTags"></div>
  </div>
</section>

<section class="notify-area" id="notifyArea" hidden>
  <div class="notify-inner" id="notifyCards"></div>
</section>

<section class="api-section">
  <div class="api-toolbar">
    <span id="apiCount" class="api-count"></span>
    <select id="sortSelect" class="sort-select">
      <option value="default">默认排序</option>
      <option value="name">按名称</option>
      <option value="source">按来源</option>
      <option value="health">按状态</option>
    </select>
  </div>
  <div class="api-grid" id="apiGrid"></div>
  <div class="pagination" id="pagination"></div>
</section>

<!-- API 工具页面 -->
<div id="detailPage" hidden>
  <div class="detail-header" id="detailHeader">
    <a class="detail-back" href="#/">← 返回列表</a>
    <span class="detail-title"></span>
    <span class="detail-source"></span>
  </div>
  <div id="detailView" class="detail-view"></div>
</div>

<div class="modal-overlay" id="modalOverlay" hidden>
  <div class="modal-panel" id="modalPanel">
    <div class="modal-header">
      <div>
        <h3 id="modalTitle"></h3>
        <span id="modalSource" class="modal-source"></span>
      </div>
      <button id="modalClose" class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div id="modalParams" class="modal-params"></div>
      <button id="modalSend" class="btn-send">发送请求</button>
      <div class="response-area" id="modalResponse">
        <div class="response-placeholder">点击"发送请求"查看响应</div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="modalCopy" class="btn-aux">复制响应</button>
      <a id="modalDoc" class="btn-aux" target="_blank" rel="noopener">查看文档</a>
    </div>
  </div>
</div>

<footer class="footer">
  <p>API 数据来源：<a href="https://api.kuleu.com" target="_blank" rel="noopener">api.kuleu.com</a> &amp; <a href="https://www.free-api.com" target="_blank" rel="noopener">free-api.com</a></p>
</footer>

<script src="js/theme.js"></script>
<script src="js/data.js"></script>
<script src="js/cards.js"></script>
<script src="js/modal.js"></script>
<script src="js/health.js"></script>
<script src="js/notify.js"></script>
<script src="js/detail.js"></script>
<script src="js/app.js"></script>
</body>
</html>
